<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="popup.css"><title>Vitala Amanah</title></head><body><header><div class="mark">VA</div><div><b>Vitala Amanah</b><small>Chrome companion</small></div><button id="open" title="Open full app">↗</button></header><main><section id="summary" class="summary" aria-live="polite"><span>Loading readiness…</span></section><nav><button id="dashboard">Open dashboard</button><button id="signin">Sign in</button></nav><section class="capture"><span class="eyebrow">QUICK CAPTURE</span><h1>Add an asset</h1><p>Save a basic record now; add sensitive details only in the full app.</p><form id="form"><label>Name<input name="name" required minlength="2" maxlength="120" placeholder="e.g. Savings account"></label><div class="row"><label>Category<select name="category"><option>Cash</option><option>Property</option><option>Investment</option><option>Retirement</option><option>Vehicle</option><option>Other</option></select></label><label>Value (RM)<input name="value" type="number" min="0" step="0.01" required placeholder="0"></label></div><button class="primary" id="save">Save to Vitala Amanah</button><div id="message" role="status"></div></form></section><p class="notice">Demo companion: never enter passwords, PINs, card numbers or recovery phrases.</p></main><script src="popup.js"></script></body></html>
